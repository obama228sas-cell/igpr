<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тема 1. Введение. ИГПР - Гребенников</title>
<style>
  body { 
    margin: 0; background: #0d1117; color: #e6d5b8; font-family: Georgia, serif; 
    overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; user-select: none;
  }
  .slider { 
    width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; 
    position: relative; background: #161b22; box-shadow: 0 0 20px rgba(0,0,0,0.8); overflow: hidden; 
  }
  .slide { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; 
    transition: opacity 0.5s ease-in-out; padding: 5%; box-sizing: border-box; 
    display: flex; flex-direction: column; justify-content: flex-start;
  }
  .slide.active { opacity: 1; z-index: 2; }
  h1 { color: #d4a853; font-size: 2.5vw; margin-bottom: 2%; text-align: center; border-bottom: 2px solid #8b7355; padding-bottom: 1%;}
  p { font-size: 1.5vw; line-height: 1.5; color: #c9b99a; text-align: justify; margin: 1% 0;}
  .nav { position: absolute; bottom: 3%; left: 50%; transform: translateX(-50%); display: flex; gap: 1vw; z-index: 10; }
  .dot { width: 1vw; height: 1vw; background: #8b7355; border-radius: 50%; cursor: pointer; transition: 0.3s; }
  .dot.active { background: #d4a853; transform: scale(1.2); }
  .counter { position: absolute; bottom: 3%; right: 3%; font-size: 1.5vw; color: #8b7355; z-index: 10; font-weight: bold; }
  .images-row { display: flex; justify-content: center; gap: 2%; height: 40%; margin-top: auto; margin-bottom: 5%; }
  img { max-height: 100%; object-fit: contain; border: 3px solid #8b7355; border-radius: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
</style>
</head>
<body>
<div class="slider" id="slider"></div>
<script>
  const slidesData = [
    { title: "1. Цели и задачи курса «ИГПР»", text: "История государства и права России (ИГПР) — фундаментальная правовая дисциплина. Главная цель курса заключается в формировании у студентов комплексного понимания процессов зарождения, становления и развития государственных и правовых институтов на территории России. Основные задачи включают изучение исторических фактов, анализ эволюции нормативно-правовых актов, выявление закономерностей развития государственного аппарата и правовой системы от древности до наших дней." },
    { title: "2. Предмет и объект ИГПР", text: "Объектом изучения дисциплины выступают государство и право России в процессе их исторического развития. Предметом являются специфические закономерности, процессы возникновения, функционирования и эволюции государственных механизмов и правовых институтов на различных исторических этапах. Важно понимать, что в отличие от теории государства и права, ИГПР изучает эти институты в их конкретно-исторической хронологической реальности." },
    { title: "3. Методология дисциплины", text: "Методология ИГПР базируется на общенаучных и специальных методах. Ключевыми являются исторический и логический методы. Историко-сравнительный метод позволяет сопоставлять государственно-правовые институты России с зарубежными аналогами или сравнивать их на разных этапах развития. Также активно применяются системно-структурный, статистический и формально-юридический (догматический) методы для детального анализа текстов исторических источников права." },
    { title: "4. Место в системе наук", text: "ИГПР занимает связующее положение между историческими и юридическими науками. Как историческая наука, она опирается на факты, хронологию и архивные данные. Как юридическая — оперирует правовыми понятиями, исследует природу законов и властных институтов. Она служит необходимой базой для изучения отраслевых юридических наук (конституционного, уголовного, гражданского права), показывая их исторические корни." },
    { title: "5. Периодизация ИГПР", text: "Периодизация отражает ключевые этапы развития государства. Традиционно выделяют: 1) Древнерусское государство (IX-XII вв.); 2) Период раздробленности (XII-XV вв.); 3) Русское централизованное государство (XV-XVII вв.); 4) Российская империя периода абсолютизма (XVIII - середина XIX в.); 5) Пореформенная монархия (вторая половина XIX - начало XX в.); 6) Советское государство (1917-1991 гг.); 7) Современная Российская Федерация." },
    { title: "6. Причины возникновения государства. Норманизм", text: "Среди причин образования государства у восточных славян выделяют экономические (переход к пашенному земледелию), социальные (расслоение общества) и внешнеполитические (необходимость защиты от кочевников). Норманнская теория (Байер, Миллер) связывает создание Руси с призванием варягов. Антинорманисты (Ломоносов, Рыбаков) доказывают, что государство — результат длительного внутреннего развития славянских племен, а варяги лишь возглавили уже готовые структуры.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/East_Slavic_tribes_8th_9th_century.png/320px-East_Slavic_tribes_8th_9th_century.png" },
    { title: "7. Социальное устройство Древней Руси", text: "Общество делилось на свободных и зависимых. К верхушке относились князья, бояре и дружинники. Основную массу свободного населения составляли «люди» (смерды-общинники). К полузависимым категориям относились закупы (работавшие за долг-купу) и рядовичи (работавшие по договору-ряду). Полностью бесправной категорией были холопы и челядь, находившиеся на положении рабов." },
    { title: "8. Власть и управление в Древнерусском государстве", text: "Форма правления характеризовалась как раннефеодальная монархия. Во главе стоял Великий князь киевский. Значительную роль играло вече — народное собрание, решавшее вопросы войны и мира. При князе действовал совет (Боярская дума), состоявший из старших дружинников и местной знати. На местах управляли наместники и волостели, действовала десятичная система управления (тысяцкие, сотские).", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Veche.jpg/280px-Veche.jpg" },
    { title: "9. Военное устройство. Дружина", text: "Основой вооруженных сил была княжеская дружина, делившаяся на «старшую» (бояре, ближайшие советники) и «младшую» (отроки, гриди — рядовые воины). Дружина не только воевала, но и выполняла административно-судебные функции (сбор дани — полюдье). Во время крупных войн созывалось народное ополчение, строившееся по десятичному принципу во главе с тысяцким." },
    { title: "10. Политика первых князей", text: "Первые князья (Олег, Игорь, Святослав) фокусировались на подчинении славянских племен Киеву и контроле над торговым путем «из варяг в греки». Важнейшей реформой стала налоговая реформа княгини Ольги: после убийства Игоря древлянами она установила точные размеры дани («уроки») и места её сбора («погосты»), что стало первым шагом к созданию упорядоченного государственного аппарата.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Vasnetsov_Oleg.jpg/280px-Vasnetsov_Oleg.jpg" },
    { title: "11. Источники права Древней Руси", text: "Источники права включали обычное право, договоры Руси с Византией (содержащие нормы международного, торгового и уголовного права), княжеские уставы (Уставы Владимира, Ярослава) и рецепцию византийского права (Кормчая книга, Номоканон). Обычное право долгое время оставалось главным источником, пока не было кодифицировано в Русской Правде." },
    { title: "12. «Русская Правда»", text: "Русская Правда — первый писаный свод законов Древней Руси. Состоит из трех основных редакций: Краткая (Правда Ярослава и Правда Ярославичей), Пространная и Сокращенная. Она закрепляла социальное неравенство (различные штрафы за убийство в зависимости от статуса), защищала частную собственность и регламентировала порядок судопроизводства. Кровная месть постепенно заменялась денежными штрафами (вирами).", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d8/Russkaya_Pravda_Akademicheskiy_spisok.jpg/320px-Russkaya_Pravda_Akademicheskiy_spisok.jpg" },
    { title: "13. Основные институты древнерусского права", text: "Преступление по Русской Правде называлось «обидой» и понималось как причинение материального или морального ущерба личности. Виды наказаний: поток и разграбление (высшая мера), вира (штраф за убийство), продажа (штраф за иные преступления). Гражданское право знало договоры купли-продажи, займа, поклажи. Наследство передавалось сыновьям, дочери наследовали только у бояр." },
    { title: "14. Судебный процесс в Древней Руси", text: "Процесс носил состязательный (обвинительный) характер: стороны были равноправны, дело возбуждалось по инициативе истца. Основные стадии: «заклич» (публичное объявление о преступлении), «свод» (поиск украденной вещи по цепочке владельцев) и «гонение следа» (преследование преступника). Доказательствами служили показания свидетелей (видоков и послухов), присяга (рота) и ордалии (суд Божий — испытание железом или водой)." },
    { title: "15. Безопасность государства в Древней Руси", text: "Концепция безопасности в древности сводилась преимущественно к защите от внешних врагов (кочевников, Византии) и сохранению власти князя. Безопасность обеспечивалась системой крепостей (заставы богатырские), договорами с соседями и личной преданностью дружины. Важным элементом внутренней безопасности было суровое наказание за посягательство на княжеских людей и имущество." },
    { title: "16. Влияние Византии на право", text: "С принятием христианства в 988 году византийское право оказало огромное влияние на Русь. Через церковные уставы были заимствованы нормы семейного и наследственного права. Церковные суды рассматривали дела о браке, разводе, колдовстве. Византийские сборники (Эклога, Прохирон) переводились и адаптировались к местным условиям, обогащая древнерусскую правовую культуру.", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Lebedev_baptism.jpg/320px-Lebedev_baptism.jpg" },
    { title: "Заключение", text: "Изучение государственно-правовых институтов Древней Руси позволяет увидеть истоки отечественной государственности. От племенных союзов через раннефеодальную монархию Русь пришла к созданию уникальной правовой системы, венцом которой стала Русская Правда. Этот исторический этап заложил прочный фундамент для всех последующих трансформаций российского государства и права." }
  ];

  const slider = document.getElementById('slider');
  let html = '';
  slidesData.forEach((s, i) => {
    let imgHtml = s.img ? `<div class="images-row"><img src="${s.img}" alt="Иллюстрация к слайду"></div>` : '';
    html += `<div class="slide ${i===0?'active':''}" id="slide-${i}">
      <h1>${s.title}</h1>
      <p>${s.text}</p>
      ${imgHtml}
    </div>`;
  });

  html += `<div class="nav">${slidesData.map((_,i) => `<div class="dot ${i===0?'active':''}" data-index="${i}"></div>`).join('')}</div>`;
  html += `<div class="counter"><span id="curr">1</span> / ${slidesData.length}</div>`;
  slider.innerHTML = html;

  let curr = 0;
  function goTo(i) {
    document.querySelectorAll('.slide')[curr].classList.remove('active');
    document.querySelectorAll('.dot')[curr].classList.remove('active');
    curr = i;
    document.querySelectorAll('.slide')[curr].classList.add('active');
    document.querySelectorAll('.dot')[curr].classList.add('active');
    document.getElementById('curr').innerText = curr + 1;
  }

  document.querySelectorAll('.dot').forEach(dot => {
    dot.addEventListener('click', (e) => goTo(parseInt(e.target.dataset.index)));
  });

  document.addEventListener('keydown', e => {
    if((e.key === 'ArrowRight' || e.key === 'Space') && curr < slidesData.length-1) goTo(curr+1);
    if(e.key === 'ArrowLeft' && curr > 0) goTo(curr-1);
  });

  let touchstartX = 0;
  document.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX);
  document.addEventListener('touchend', e => {
    let touchendX = e.changedTouches[0].screenX;
    if(touchstartX - touchendX > 50 && curr < slidesData.length-1) goTo(curr+1);
    if(touchendX - touchstartX > 50 && curr > 0) goTo(curr-1);
  });
</script>
</body>
</html>
